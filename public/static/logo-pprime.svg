<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80" role="img" aria-label="PPrime – Power Your Future">
  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0a1c2e"/>
      <stop offset="100%" stop-color="#0e2840"/>
    </linearGradient>

    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6dc4f5"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="300" height="80" rx="8" fill="url(#bg)"/>

  <!-- ============================================================
       ICON — 2 bars only
       Bar width  : 9px
       Gap        : 8px
       Bottom edge: y=66
       Left bar   : top y=20 → height=46
       Right bar  : top y=14 → height=52
       rx=4.5 (same both)
       ============================================================ -->

  <!-- Left bar — shorter -->
  <rect x="18" y="20" width="9" height="46" rx="4.5" fill="url(#barGrad)"/>

  <!-- Right bar — taller, same bottom (14+52=66, 20+46=66 ✓) -->
  <rect x="35" y="14" width="9" height="52" rx="4.5" fill="url(#barGrad)"/>

  <!-- ============================================================
       TEXT — centered on mid of taller bar: 14 + 52/2 = 40
       ============================================================ -->

  <!-- "PPrime" -->
  <text
    x="58"
    y="40"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="800"
    fill="#ffffff"
    dominant-baseline="middle"
    letter-spacing="0.3"
  >PPrime</text>

  <!-- "POWER YOUR FUTURE" -->
  <text
    x="59"
    y="61"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="8"
    font-weight="400"
    fill="#6dc4f5"
    letter-spacing="3.2"
  >POWER YOUR FUTURE</text>

</svg>
