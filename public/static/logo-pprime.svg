<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" width="320" height="90" role="img" aria-label="PPrime – Power Your Future">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e30"/>
      <stop offset="100%" stop-color="#0f2a44"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec8f4"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec8f4"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9dd6f8"/>
      <stop offset="100%" stop-color="#c8eaff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="90" rx="8" fill="url(#bg)"/>

  <!-- ===================== ICON ===================== -->
  <!-- Bar 1: tall, left — centered at y=22 to y=66 (height=44) -->
  <rect x="20" y="22" width="9" height="44" rx="4.5" fill="url(#g1)"/>

  <!-- Bar 2: shorter, right — centered at y=29 to y=66 (height=37) -->
  <rect x="35" y="29" width="9" height="37" rx="4.5" fill="url(#g2)"/>

  <!-- Apostrophe: angled, top-right -->
  <rect
    x="48" y="20"
    width="6" height="17"
    rx="3"
    fill="url(#g3)"
    transform="rotate(-18 51 28.5)"
  />

  <!-- ===================== TEXT ===================== -->
  <!-- "PPrime" main title — vertically centered in icon range (22+66)/2 = 44 -->
  <text
    x="70"
    y="44"
    font-family="'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="32"
    font-weight="800"
    fill="#ffffff"
    dominant-baseline="middle"
    letter-spacing="0.3"
  >PPrime</text>

  <!-- Tagline -->
  <text
    x="71"
    y="66"
    font-family="'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="8.5"
    font-weight="400"
    fill="#7ec8f4"
    letter-spacing="3.5"
  >POWER YOUR FUTURE</text>
</svg>
