<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 70" width="260" height="70" role="img" aria-label="PPrime - Power Your Future">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1e32"/>
      <stop offset="100%" stop-color="#0f2a44"/>
    </linearGradient>
    <linearGradient id="barGradC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c8dff5" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="accentGradC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ab4ff"/>
      <stop offset="100%" stop-color="#3a8fe0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="260" height="70" rx="6" fill="url(#bgGrad)"/>

  <!-- === ICON === -->
  <!-- Bar 1 -->
  <rect x="14" y="14" width="7" height="42" rx="3.5" fill="url(#barGradC)"/>
  <!-- Bar 2 -->
  <rect x="27" y="20" width="7" height="35" rx="3.5" fill="url(#barGradC)"/>
  <!-- Apostrophe accent -->
  <rect x="39" y="12" width="5" height="16" rx="2.5" fill="url(#accentGradC)" transform="rotate(-20 41.5 20)"/>

  <!-- === TEXT === -->
  <text
    x="60"
    y="40"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="800"
    letter-spacing="0.3"
    fill="#ffffff"
  >PPrime</text>

  <text
    x="61"
    y="56"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="8"
    font-weight="400"
    letter-spacing="2.8"
    fill="#7fa8cc"
  >POWER YOUR FUTURE</text>
</svg>
