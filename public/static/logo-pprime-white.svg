<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 68" width="260" height="68" role="img" aria-label="PPrime – Power Your Future">
  <defs>

    <!-- Single gradient shared by both bars: light blue top → white bottom -->
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6dc4f5"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

  </defs>

  <!-- ============================================================
       ICON — 2 vertical bars only, NO apostrophe, NO extra shapes
       Bar width  : 8px each
       Gap between: 7px
       Alignment  : both bars share the same bottom edge (y=58)
       Left bar   : shorter  → top at y=16  → height = 42
       Right bar  : taller   → top at y=10  → height = 48
       Rounded corners: rx=4 (same on both)
       ============================================================ -->

  <!-- Left bar — shorter -->
  <rect x="4"  y="16" width="8" height="42" rx="4" fill="url(#barGrad)"/>

  <!-- Right bar — taller, same bottom -->
  <rect x="19" y="10" width="8" height="48" rx="4" fill="url(#barGrad)"/>

  <!-- ============================================================
       TEXT BLOCK
       Vertically centered on the midpoint of the taller bar:
         mid = 10 + 48/2 = 34  → title baseline anchor
       ============================================================ -->

  <!-- "PPrime" -->
  <text
    x="40"
    y="34"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27"
    font-weight="800"
    fill="#ffffff"
    dominant-baseline="middle"
    letter-spacing="0.3"
  >PPrime</text>

  <!-- "POWER YOUR FUTURE" -->
  <text
    x="41"
    y="53"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="7"
    font-weight="400"
    fill="#6dc4f5"
    letter-spacing="3.0"
  >POWER YOUR FUTURE</text>

</svg>
