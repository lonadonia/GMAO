<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80" role="img" aria-label="PPrime – Power Your Future">

  <!--
    ICON layout — all bottom-aligned at y=74
    ┌──┐              ← y=8   (bar1 top)
    │  │
    │  │  ┌──┐        ← y=27  (bar2 top)
    │  │  │  │  ╲     ← apostrophe: just right of bar2 top, tilted
    │  │  │  │
    └──┘  └──┘        ← y=74  (shared bottom)
  -->

  <!-- BAR 1 — tall, left : x=4, w=10, y=8→74, rx=5 -->
  <rect x="4" y="8" width="10" height="66" rx="5" fill="white"/>

  <!-- BAR 2 — short, right : x=20, w=8, y=27→74, rx=4 -->
  <rect x="20" y="27" width="8" height="47" rx="4" fill="white"/>

  <!--
    APOSTROPHE — sits immediately top-right of bar2
    In original: a thin diagonal stroke just above & right of bar2 top
    Position: x=30 (1px gap from bar2 right edge=28), y=8 (same level as bar1 top)
    Size: w=3.5, h=14
    Rotation: -20° around its own center (31.75, 15)
  -->
  <rect x="30" y="8" width="3.5" height="14" rx="1.75"
        fill="white"
        transform="rotate(-20, 31.75, 15)"/>

  <!-- TEXT: PPrime — vertically centered on bar1 midpoint (8+74)/2=41 -->
  <text
    x="44"
    y="41"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="800"
    fill="white"
    dominant-baseline="middle"
    letter-spacing="0.2"
  >PPrime</text>

  <!-- TAGLINE: POWER YOUR FUTURE -->
  <text
    x="45"
    y="61"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="7.2"
    font-weight="400"
    fill="white"
    opacity="0.75"
    letter-spacing="2.8"
  >POWER YOUR FUTURE</text>

</svg>
