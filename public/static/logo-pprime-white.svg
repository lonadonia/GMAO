<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 68" width="260" height="68" role="img" aria-label="PPrime – Power Your Future">
  <!--
    PPrime — logo fidèle à l'identité officielle
    ─────────────────────────────────────────────
    ICON (barres + apostrophe) aligné par le bas à y=62
    Bar1 : x=4  w=14  h=58  rx=5   top=4
    Bar2 : x=25 w=11  h=36  rx=4   top=26  (ratio h=0.62)
    Apos : x=40 h=14  w=3.5 rx=1.75 rot=-22° centred (41.75,13)
    Gap bar1→bar2 = 7px
    Gap bar2→apos = 4px (bord gauche apos = 40)
  -->

  <!-- BAR 1 — grande barre gauche, arrondie -->
  <rect x="4" y="4" width="14" height="58" rx="5" ry="5" fill="white"/>

  <!-- BAR 2 — petite barre droite (alignée par le bas) -->
  <rect x="25" y="26" width="11" height="36" rx="4" ry="4" fill="white"/>

  <!-- APOSTROPHE — fine tige diagonale juste en haut à droite de Bar2 -->
  <rect x="39.5" y="6" width="3.5" height="14" rx="1.75" ry="1.75"
        fill="white"
        transform="rotate(-22, 41.25, 13)"/>

  <!-- "PPrime" — gras, blanc, centré verticalement sur la hauteur de l'icône -->
  <text
    x="52"
    y="33"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="25"
    font-weight="800"
    fill="white"
    dominant-baseline="middle"
    letter-spacing="0.3"
  >PPrime</text>

  <!-- Tagline -->
  <text
    x="53"
    y="52"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="6.5"
    font-weight="400"
    fill="white"
    opacity="0.70"
    letter-spacing="2.5"
  >POWER YOUR FUTURE</text>

</svg>
